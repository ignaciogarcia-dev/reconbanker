services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reconbanker
      POSTGRES_USER: reconbanker
      POSTGRES_PASSWORD: reconbanker
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"

volumes:
  postgres_data:
